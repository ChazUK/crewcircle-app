pre-commit:
  parallel: true
  jobs:
    - name: lint-fix
      glob: "**/*.{js,jsx,ts,tsx,mjs,cjs,mts,cts,json,jsonc}"
      run: npx oxlint --fix {staged_files}
      stage_fixed: true
    - name: format
      glob: "**/*"
      run: npx oxfmt --no-error-on-unmatched-pattern --write {staged_files}
      stage_fixed: true
    - name: test
      run: npx vitest run
      follow: true
